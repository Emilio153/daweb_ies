<div class="app-layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo-container">
      <span class="material-icons-round text-primary" style="font-size: 32px;">school</span>
      <h2>Daweb IES</h2>
    </div>
    
    <nav class="nav-menu">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-item">
        <span class="material-icons-round">dashboard</span> Dashboard
      </a>
      <a routerLink="/alumnos" routerLinkActive="active" class="nav-item">
        <span class="material-icons-round">groups</span> Alumnos
      </a>
      <a routerLink="/profesores" routerLinkActive="active" class="nav-item">
        <span class="material-icons-round">person</span> Profesores
      </a>
      <a routerLink="/asignaturas" routerLinkActive="active" class="nav-item">
        <span class="material-icons-round">menu_book</span> Asignaturas
      </a>
      <a routerLink="/matriculas" routerLinkActive="active" class="nav-item">
        <span class="material-icons-round">assignment</span> Matrículas
      </a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="top-header">
      <div style="font-size: 1.1rem; font-weight: 500;">
        Bienvenido al panel de gestión
      </div>
      <div style="display: flex; align-items: center; gap: 1rem;">
        <span class="material-icons-round text-muted" style="cursor: pointer;">notifications</span>
        <div class="avatar">Admin</div>
      </div>
    </header>
    
    <div class="content-wrapper">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
